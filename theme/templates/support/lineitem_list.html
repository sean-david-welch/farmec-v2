{% extends "base.html" %}
{% load static %}

{% block title %}Line Items - Farmec Ireland{% endblock %}

{% block content %}
<section id="lineItems">
    <h1 class="section-heading">Product Line Items:</h1>

    {% for lineitem in lineitems %}
    <div class="product-view">
        <h2 class="main-heading">
            {{ lineitem.name }} -- {{ lineitem.price }}
        </h2>
        <img
            src="{{ lineitem.image }}"
            alt="{{ lineitem.name }}"
            width="400"
            height="400"
            onerror="this.src='{% static 'default.jpg' %}'"
        />
    </div>
    {% empty %}
    <p class="paragraph">No line items found.</p>
    {% endfor %}
</section>
{% endblock %}

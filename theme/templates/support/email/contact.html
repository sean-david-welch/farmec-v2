<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<table width="100%" cellpadding="0" cellspacing="0" class="wrapper">
    <tr>
        <td align="center">
            <table width="620" cellpadding="0" cellspacing="0" class="card">

                <!-- Header -->
                <tr>
                    <td class="header">
                        <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                                <td>
                                    <div class="brand-name">FARMEC</div>
                                    <div class="brand-subtitle">Importers &amp; Distributors of Quality Agricultural
                                        Machinery
                                    </div>
                                </td>
                                <td align="right" class="doc-info">
                                    <div class="doc-title">New Contact</div>
                                    <div class="doc-ref">{{ generated_date }}</div>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td class="body">

                        <!-- Sender -->
                        <table width="100%" cellpadding="0" cellspacing="0" class="section">
                            <tr>
                                <td class="section-title">Sender</td>
                            </tr>
                            <tr>
                                <td class="section-body">
                                    <table width="100%" cellpadding="0" cellspacing="0">
                                        <tr>
                                            <td width="50%" class="field-col-left">
                                                <div class="field-label">Name</div>
                                                <div class="field-value">{{ name }}</div>
                                            </td>
                                            <td width="50%" class="field-col-right">
                                                <div class="field-label">Email</div>
                                                <div class="field-value"><a href="mailto:{{ email }}"
                                                                            class="email-link">{{ email }}</a></div>
                                            </td>
                                        </tr>
                                    </table>
                                </td>
                            </tr>
                        </table>

                        <!-- Message -->
                        <table width="100%" cellpadding="0" cellspacing="0" class="section">
                            <tr>
                                <td class="section-title">Message</td>
                            </tr>
                            <tr>
                                <td class="section-body">
                                    <div class="message">{{ message }}</div>
                                </td>
                            </tr>
                        </table>

                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td class="footer">
                        <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                                <td class="footer-text">Farmec Ireland Ltd.</td>
                                <td align="right" class="footer-text">{{ generated_date }}</td>
                            </tr>
                        </table>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Contact</title>
</head>
<body>

<table class="wrapper">
    <tr>
        <td>
            <table class="card">
                <!-- Header -->
                <tr>
                    <td class="header">
                        <table class="full-width">
                            <tr>
                                <td>
                                    <div class="brand-name">FARMEC</div>
                                    <div class="brand-subtitle">Importers &amp; Distributors of Quality Agricultural
                                        Machinery
                                    </div>
                                </td>
                                <td class="doc-info">
                                    <div class="doc-title">New Contact</div>
                                    <div class="doc-ref">{{ generated_date }}</div>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <!-- Body -->
                <tr>
                    <td class="body">
                        <!-- Sender -->
                        <table class="section full-width">
                            <tr>
                                <td class="section-title">Sender</td>
                            </tr>
                            <tr>
                                <td class="section-body">
                                    <table class="full-width">
                                        <tr>
                                            <td class="field-col-left col-half">
                                                <div class="field-label">Name</div>
                                                <div class="field-value">{{ name }}</div>
                                            </td>
                                            <td class="field-col-right col-half">
                                                <div class="field-label">Email</div>
                                                <div class="field-value"><a href="mailto:{{ email }}"
                                                                            class="email-link">{{ email }}</a></div>
                                            </td>
                                        </tr>
                                    </table>
                                </td>
                            </tr>
                        </table>
                        <!-- Message -->
                        <table class="section full-width">
                            <tr>
                                <td class="section-title">Message</td>
                            </tr>
                            <tr>
                                <td class="section-body">
                                    <div class="message">{{ message }}</div>
                                </td>
                            </tr>
                        </table>

                    </td>
                </tr>
                <!-- Footer -->
                <tr>
                    <td class="footer">
                        <table class="full-width">
                            <tr>
                                <td class="footer-text">Farmec Ireland Ltd.</td>
                                <td class="footer-text align-right">{{ generated_date }}</td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>

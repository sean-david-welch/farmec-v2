<section id="machineregistration-form">
    <dialog id="machineRegistrationDialog" class="dialog">
        <button class="dialog-close-btn" type="button"
                onclick="document.getElementById('machineRegistrationDialog').close(); document.getElementById('machineRegistrationDialog').classList.remove('dialog-visible')">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <form class="form" hx-post="{% url 'catalog:spareparts' %}" hx-target="#machineregistration-dialog-container" hx-swap="innerHTML" hx-vals='{"component": "machineregistration"}'>
            {% csrf_token %}
            <h1 class="main-heading">Machine Registration Form</h1>

            {% for field in registration_form %}
            <div>
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                <ul class="form-errors">
                    {% for error in field.errors %}
                    <p class="error-message">{{ error }}</p>
                    {% endfor %}
                </ul>
                {% endif %}
            </div>
            {% endfor %}

            <div class="form-actions">
                <button class="btn btn-form" type="submit">
                    Submit <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </dialog>
</section>

<script>
    (function () {
        const dialog = document.getElementById('machineRegistrationDialog');
        {% if not dialog_submitted %}
        if (dialog && !dialog.open) {
            dialog.showModal();
            dialog.classList.add('dialog-visible');
        }
        {% endif %}
    })();
</script>

<section id="videos">
    <h1 class="section-heading">Videos</h1>

    <div class="video-grid">
        {% for video in videos %}
        <div class="video-card" id="{{ video.title|slugify }}">
            <iframe
                width="100%"
                height="560"
                class="video"
                src="https://www.youtube-nocookie.com/embed/{{ video.video_id }}"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
                loading="lazy"
                title="{{ video.title }}"
                referrerpolicy="strict-origin-when-cross-origin"
            ></iframe>
        </div>
        {% empty %}
        <p class="paragraph">No videos to display.</p>
        {% endfor %}
    </div>
</section>

<section id="videos">
    <h1 class="section-heading">Videos</h1>

    <div class="video-grid">
        {% for video in videos %}
        <div class="video-card" id="{{ video.title|slugify }}">
            <h2 class="main-heading">{{ video.title }}</h2>

            <iframe
                width="425"
                height="315"
                class="video"
                src="https://www.youtube.com/embed/{{ video.video_id }}"
                allowfullscreen
                loading="lazy"
                title="{{ video.title }}"
            ></iframe>
        </div>
        {% empty %}
        <p class="paragraph">No videos to display.</p>
        {% endfor %}
    </div>
</section>

<div id="sidebar-backdrop" class="sidebar-backdrop" style="display: none;"></div>

<div id="sidebar-menu" class="sidebar-menu" style="display: none;">
    <div class="sidebar-nav-icon">
        <a href="{% url 'home' %}" aria-label="logo button">
            <img
                src="https://www.farmec.ie/farmec_images/farmeclogo.webp"
                alt="Farmec Logo"
                width="200"
                height="200"
            />
        </a>
        <button id="sidebar-close-btn" class="sidebar-close-btn">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <ul class="sidebar-nav-list">
        <li>
            <a href="{% url 'home' %}" class="sidebar-nav-item">
                <i class="fas fa-home"></i> Home
            </a>
        </li>
        <li>
            <a href="{% url 'about' %}" class="sidebar-nav-item">
                <i class="fas fa-circle-info"></i> About
            </a>
        </li>
        <li>
            <a href="{% url 'privacy' %}" class="sidebar-nav-item">
                <i class="fas fa-question-circle"></i> Terms of Use
            </a>
        </li>
        <li>
            <a href="{% url 'suppliers-list' %}" class="sidebar-nav-item">
                <i class="fas fa-industry"></i> Suppliers
            </a>
        </li>
        <li>
            <a href="{% url 'spareparts-list' %}" class="sidebar-nav-item">
                <i class="fas fa-cog"></i> Spare Parts
            </a>
        </li>
        <li>
            <a href="{% url 'blogs-list' %}" class="sidebar-nav-item">
                <i class="fas fa-blog"></i> Blog
            </a>
        </li>
        <li>
            <a href="{% url 'exhibitions-list' %}" class="sidebar-nav-item">
                <i class="fas fa-question-circle"></i> Exhibitions
            </a>
        </li>
        <li>
            {% mobile_login %}
        </li>
    </ul>
</div>

<button id="sidebar-toggle-btn" class="sidebar-toggle-btn">
    <a href="{% url 'home' %}" aria-label="logo button" class="sidebar-logo">
        <img
            src="https://www.farmec.ie/farmec_images/farmeclogo.webp"
            alt="Farmec Logo"
            width="200"
            height="200"
        />
    </a>
    <i class="fas fa-bars"></i>
</button>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggleBtn = document.getElementById('sidebar-toggle-btn');
    const closeBtn = document.getElementById('sidebar-close-btn');
    const menu = document.getElementById('sidebar-menu');
    const backdrop = document.getElementById('sidebar-backdrop');

    if (toggleBtn) {
        toggleBtn.addEventListener('click', function(e) {
            e.preventDefault();
            menu.style.display = 'block';
            backdrop.style.display = 'block';
        });
    }

    if (closeBtn) {
        closeBtn.addEventListener('click', function() {
            menu.style.display = 'none';
            backdrop.style.display = 'none';
        });
    }

    if (backdrop) {
        backdrop.addEventListener('click', function() {
            menu.style.display = 'none';
            backdrop.style.display = 'none';
        });
    }

    // Close menu when clicking menu items
    const menuItems = menu.querySelectorAll('.sidebar-nav-item');
    menuItems.forEach(item => {
        item.addEventListener('click', function() {
            menu.style.display = 'none';
            backdrop.style.display = 'none';
        });
    });
});
</script>

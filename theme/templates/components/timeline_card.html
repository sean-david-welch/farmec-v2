<div class="timeline-card">
    <div class="timeline-icon">
        <i class="far fa-clock"></i> {{ timeline.date }}
    </div>
    <div class="timeline-content">
        <h3>{{ timeline.title }}</h3>
        <span class="timeline-date">{{ timeline.date|date:"Y" }}</span>
        <p>{{ timeline.body }}</p>
    </div>
</div>

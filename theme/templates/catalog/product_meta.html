<meta name="description" content="{% if product.meta_description %}{{ product.meta_description }}{% else %}{{ product.name }} from {{ product.machine.supplier.name }} — available in Ireland from Farmec, authorised distributor. Part of the {{ product.machine.name }} range.{% endif %}">
<meta property="og:title" content="{% if product.meta_title %}{{ product.meta_title }}{% else %}{{ product.name }} | {{ product.machine.supplier.name }} | Farmec Ireland{% endif %}">
<meta property="og:description" content="{% if product.meta_description %}{{ product.meta_description }}{% else %}{{ product.name }} from {{ product.machine.supplier.name }} — available in Ireland from Farmec, authorised distributor. Part of the {{ product.machine.name }} range.{% endif %}">
<meta property="og:image" content="{% if product.product_image %}{{ product.product_image.url }}{% else %}https://www.farmec.ie/farmec_images/Suppliers/sip1250.webp{% endif %}">
<meta property="og:url" content="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if product.meta_title %}{{ product.meta_title }}{% else %}{{ product.name }} | {{ product.machine.supplier.name }} | Farmec Ireland{% endif %}">
<meta name="twitter:description" content="{% if product.meta_description %}{{ product.meta_description }}{% else %}{{ product.name }} from {{ product.machine.supplier.name }} — available in Ireland from Farmec, authorised distributor. Part of the {{ product.machine.name }} range.{% endif %}">
<meta name="twitter:image" content="{% if product.product_image %}{{ product.product_image.url }}{% else %}https://www.farmec.ie/farmec_images/Suppliers/sip1250.webp{% endif %}">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        {"@type": "ListItem", "position": 1, "name": "Home", "item": "{{ request.scheme }}://{{ request.get_host }}/"},
        {"@type": "ListItem", "position": 2, "name": "Suppliers", "item": "{{ request.scheme }}://{{ request.get_host }}/suppliers/"},
        {"@type": "ListItem", "position": 3, "name": "{{ product.machine.supplier.name }}", "item": "{{ request.scheme }}://{{ request.get_host }}/suppliers/{{ product.machine.supplier.slug }}/"},
        {"@type": "ListItem", "position": 4, "name": "{{ product.machine.name }}", "item": "{{ request.scheme }}://{{ request.get_host }}/machines/{{ product.machine.slug }}/"},
        {"@type": "ListItem", "position": 5, "name": "{{ product.name }}", "item": "{{ request.scheme }}://{{ request.get_host }}{{ request.path }}"}
      ]
    },
    {
      "@type": "Product",
      "name": "{{ product.name }}"{% if product.description %},
      "description": "{{ product.description|truncatechars:200|escapejs }}"{% endif %}{% if product.product_image %},
      "image": "{{ product.product_image.url }}"{% endif %},
      "brand": {
        "@type": "Brand",
        "name": "{{ product.machine.supplier.name }}"
      },
      "offers": {
        "@type": "Offer",
        "url": "{{ request.scheme }}://{{ request.get_host }}{{ request.path }}",
        "seller": {
          "@type": "Organization",
          "name": "Farmec Ireland Ltd",
          "url": "{{ request.scheme }}://{{ request.get_host }}"
        }
      }
    }
  ]
}
</script>

<meta name="description" content="{% if machine.meta_description %}{{ machine.meta_description }}{% else %}Buy the {{ machine.name }} from {{ machine.supplier.name }} in Ireland. Farmec Ireland is the authorised distributor. View full specs and details.{% endif %}">
<meta property="og:title" content="{% if machine.meta_title %}{{ machine.meta_title }}{% else %}{{ machine.name }} | {{ machine.supplier.name }} Machinery Ireland | Farmec{% endif %}">
<meta property="og:description" content="{% if machine.meta_description %}{{ machine.meta_description }}{% else %}Buy the {{ machine.name }} from {{ machine.supplier.name }} in Ireland. Farmec Ireland is the authorised distributor. View full specs and details.{% endif %}">
<meta property="og:image" content="{% if machine.machine_image %}{{ machine.machine_image.url }}{% else %}https://www.farmec.ie/farmec_images/Suppliers/sip1250.webp{% endif %}">
<meta property="og:url" content="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if machine.meta_title %}{{ machine.meta_title }}{% else %}{{ machine.name }} | {{ machine.supplier.name }} Machinery Ireland | Farmec{% endif %}">
<meta name="twitter:description" content="{% if machine.meta_description %}{{ machine.meta_description }}{% else %}Buy the {{ machine.name }} from {{ machine.supplier.name }} in Ireland. Farmec Ireland is the authorised distributor. View full specs and details.{% endif %}">
<meta name="twitter:image" content="{% if machine.machine_image %}{{ machine.machine_image.url }}{% else %}https://www.farmec.ie/farmec_images/Suppliers/sip1250.webp{% endif %}">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        {"@type": "ListItem", "position": 1, "name": "Home", "item": "{{ request.scheme }}://{{ request.get_host }}/"},
        {"@type": "ListItem", "position": 2, "name": "Suppliers", "item": "{{ request.scheme }}://{{ request.get_host }}/suppliers/"},
        {"@type": "ListItem", "position": 3, "name": "{{ machine.supplier.name }}", "item": "{{ request.scheme }}://{{ request.get_host }}/suppliers/{{ machine.supplier.slug }}/"},
        {"@type": "ListItem", "position": 4, "name": "{{ machine.name }}", "item": "{{ request.scheme }}://{{ request.get_host }}{{ request.path }}"}
      ]
    },
    {
      "@type": "Product",
      "name": "{{ machine.name }}"{% if machine.description %},
      "description": "{{ machine.description|truncatechars:200|escapejs }}"{% endif %}{% if machine.machine_image %},
      "image": "{{ machine.machine_image.url }}"{% endif %},
      "brand": {
        "@type": "Brand",
        "name": "{{ machine.supplier.name }}"
      },
      "offers": {
        "@type": "Offer",
        "url": "{{ request.scheme }}://{{ request.get_host }}{{ request.path }}",
        "seller": {
          "@type": "Organization",
          "name": "Farmec Ireland Ltd",
          "url": "{{ request.scheme }}://{{ request.get_host }}"
        }
      }
    }
  ]
}
</script>

{% extends "base.html" %}
{% load static %}

{% block title %}Checkout - Farmec Ireland{% endblock %}

{% block content %}
<div class="checkout">
    <h1 class="sub-heading">Checkout Form:</h1>

    <div id="checkout">
        <!-- Stripe embedded checkout will be initialized here via JS -->
        <div id="checkout-container"></div>
    </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
document.addEventListener('DOMContentLoaded', async function() {
    const stripe = Stripe('{{ stripe_public_key }}');

    // Get line item ID from URL if present
    const pathParts = window.location.pathname.split('/');
    const lineItemId = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];

    try {
        const response = await fetch(`/api/checkout/create-checkout-session/${lineItemId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            }
        });

        const data = await response.json();

        if (data.session && data.session.client_secret) {
            const checkout = await stripe.initEmbeddedCheckout({
                clientSecret: data.session.client_secret
            });
            checkout.mount('#checkout-container');
        }
    } catch (error) {
        console.error('Error initializing checkout:', error);
        document.getElementById('checkout-container').innerHTML =
            '<p class="error">Unable to load checkout. Please try again later.</p>';
    }
});
</script>
{% endblock %}

server {
    listen 80;
    listen [::]:80;
    server_name farmec.ie www.farmec.ie;

    return 301 https://farmec.ie$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name farmec.ie www.farmec.ie;

    ssl_certificate /etc/letsencrypt/live/farmec.ie/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/farmec.ie/privkey.pem;

    # Static files collected by Django
    location /static/ {
        alias /home/seanwelch/farmec-v2/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }
}

name: Deploy Django Application

on:
    push:
        branches:
            - main
        paths:
            - '**/*.py'
            - '**/templates/**'
            - '**/static/**'
            - 'pyproject.toml'
            - 'uv.lock'
            - 'Dockerfile'
            - 'docker-compose.yml'
            - 'misc/**'
            - '.github/workflows/**'

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to EC2
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  envs: SECRET_KEY,DEBUG,ALLOWED_HOSTS,AWS_ACCESS_KEY,AWS_SECRET_ACCESS_KEY,RESEND_TOKEN,EMAIL_USER
                  script: |
                      printf "SECRET_KEY=%s\nDEBUG=%s\nALLOWED_HOSTS=%s\nAWS_ACCESS_KEY=%s\nAWS_SECRET_ACCESS_KEY=%s\nRESEND_TOKEN=%s\nEMAIL_USER=%s\n" \
                        "$SECRET_KEY" "$DEBUG" "$ALLOWED_HOSTS" "$AWS_ACCESS_KEY" "$AWS_SECRET_ACCESS_KEY" "$RESEND_TOKEN" "$EMAIL_USER" \
                        > /home/seanwelch/farmec-v2/.env

                      cd /home/seanwelch/farmec-v2
                      git pull origin main
                      docker compose build
                      docker compose run --rm web uv run python manage.py migrate --noinput
                      docker compose up -d --remove-orphans
                      sudo nginx -s reload

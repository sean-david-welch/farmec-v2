name: Deploy Django Application

on:
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - '**/templates/**'
      - '**/static/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'misc/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: ${{ secrets.DEBUG }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          RESEND_TOKEN: ${{ secrets.RESEND_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: SECRET_KEY,DEBUG,ALLOWED_HOSTS,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,RESEND_TOKEN,EMAIL_USER,GOOGLE_MAPS_API_KEY,YOUTUBE_API_KEY
          script: |
            set -e
            printf "SECRET_KEY=%s\nDEBUG=%s\nALLOWED_HOSTS=%s\nAWS_ACCESS_KEY_ID=%s\nAWS_SECRET_ACCESS_KEY=%s\nRESEND_TOKEN=%s\nEMAIL_USER=%s\nGOOGLE_MAPS_API_KEY=%s\nYOUTUBE_API_KEY=%s\n" \
              "$SECRET_KEY" "$DEBUG" "$ALLOWED_HOSTS" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" "$RESEND_TOKEN" "$EMAIL_USER" "$GOOGLE_MAPS_API_KEY" "$YOUTUBE_API_KEY" \
              > /home/seanwelch/farmec-v2/.env
            
            cd /home/seanwelch/farmec-v2
            git pull origin main
            docker compose build
            docker compose run --rm web uv run python manage.py migrate --noinput
            docker compose up -d --remove-orphans
            sudo nginx -s reload

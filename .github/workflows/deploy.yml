name: Deploy Django Application

on:
    push:
        branches:
            - main
        paths:
            - '**/*.py'
            - '**/templates/**'
            - '**/static/**'
            - 'pyproject.toml'
            - 'uv.lock'
            - 'Dockerfile'
            - 'docker-compose.yml'
            - 'misc/**'
            - '.github/workflows/**'

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to EC2
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  envs: SECRET_KEY,DEBUG,ALLOWED_HOSTS,AWS_ACCESS_KEY,AWS_SECRET_ACCESS_KEY,RESEND_TOKEN,EMAIL_USER
                  script: |
                      cat > /home/seanwelch/farmec-v2/.env << EOF
                      SECRET_KEY=$SECRET_KEY
                      DEBUG=$DEBUG
                      ALLOWED_HOSTS=$ALLOWED_HOSTS
                      AWS_ACCESS_KEY=$AWS_ACCESS_KEY
                      AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
                      RESEND_TOKEN=$RESEND_TOKEN
                      EMAIL_USER=$EMAIL_USER
                      EOF

                      cd /home/seanwelch/farmec-v2
                      git pull origin main
                      docker compose build
                      docker compose run --rm web uv run python manage.py migrate --noinput
                      docker compose up -d --remove-orphans
                      sudo nginx -s reload
